<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - AI Quality Lab</title>
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .blog-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        .blog-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .blog-header h1 {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .blog-header p {
            font-size: 18px;
            color: var(--text-light);
        }

        .articles-grid {
            display: grid;
            gap: 30px;
            margin-bottom: 60px;
        }

        .article-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0, 191, 165, 0.1);
            transition: var(--transition);
            cursor: pointer;
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }

        .article-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 13px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .article-date {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .article-category {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), #00d4aa);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .article-card h2 {
            color: var(--primary);
            margin: 15px 0;
            font-size: 24px;
            line-height: 1.4;
        }

        .article-card p {
            color: var(--text-light);
            line-height: 1.7;
            margin-bottom: 15px;
        }

        .read-more {
            display: inline-block;
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            padding: 8px 0;
            border-bottom: 2px solid var(--accent);
            transition: var(--transition);
        }

        .read-more:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        .article-full {
            background: white;
            border-radius: 12px;
            padding: 60px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0, 191, 165, 0.1);
        }

        .article-full h1 {
            color: var(--primary);
            font-size: 36px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .article-full-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            font-size: 14px;
            color: var(--text-light);
        }

        .article-full-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .article-content {
            color: var(--text);
            line-height: 1.9;
            font-size: 16px;
        }

        .article-content h2 {
            color: var(--primary);
            font-size: 24px;
            margin-top: 40px;
            margin-bottom: 15px;
        }

        .article-content h3 {
            color: var(--primary);
            font-size: 20px;
            margin-top: 30px;
            margin-bottom: 12px;
        }

        .article-content p {
            margin-bottom: 15px;
        }

        .article-content ul {
            margin-bottom: 15px;
            padding-left: 25px;
        }

        .article-content li {
            margin-bottom: 8px;
        }

        .code-block {
            background: #f5f5f5;
            border-left: 4px solid var(--accent);
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
            color: #333;
        }

        .highlight {
            background: linear-gradient(135deg, #e0f7ff, #f0e7ff);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            margin: 20px 0;
        }

        .back-button {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 30px;
            transition: var(--transition);
        }

        .back-button:hover {
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .blog-container {
                padding: 40px 20px;
            }

            .article-full {
                padding: 30px;
            }

            .article-full h1 {
                font-size: 24px;
            }

            .blog-header h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="logo">AI Quality Lab</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Blog</a>
        <a href="about.html">About</a>
        <a href="python-tutorials/python-basics.html">Python</a>
        <a href="ai-testing/readme.html">AI Testing</a>
        <a href="interview-questions/readme.html">Interview Qs</a>
        <a href="projects/readme.html">Projects</a>
    </nav>
</header>

<div class="blog-container">
    <div class="blog-header">
        <h1>📚 AI Testing Blog</h1>
        <p>Expert insights on prompt testing, SDET practices, and AI quality assurance.</p>
    </div>

    <div class="articles-grid" id="articles-list">
        <!-- Articles will be loaded here -->
    </div>
</div>

<!-- Chatbot Widget -->
<section class="chatbot-section">
    <div class="chatbot-container">
        <div class="chatbot-header">
            <h3>💬 AI Testing Assistant</h3>
            <p>Ask me about AI testing, automation & best practices</p>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-container">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Type your question..." 
                class="chat-input"
            >
            <button id="send-btn" class="chat-send-btn">Send</button>
        </div>
    </div>
</section>

<footer>
    <p>&copy; 2025 AI Quality Lab</p>
</footer>

<script>
    // Articles data
    const articles = [
        {
            id: 1,
            title: "Mastering Prompt Engineering: A Comprehensive Guide to AI Model Testing",
            date: "2026-04-18",
            category: "Prompt Testing",
            summary: "Learn the fundamentals of prompt engineering and how to craft effective prompts for testing AI models. This guide covers best practices, common mistakes, and advanced techniques.",
            url: "blog-article-1.html"
        },
        {
            id: 2,
            title: "7 Advanced Techniques to Improve Your Prompt Testing Strategy",
            date: "2026-04-15",
            category: "SDET Tips",
            summary: "Discover advanced prompting techniques including chain-of-thought, few-shot learning, and role-based prompting. Learn how to use these techniques to get better AI responses.",
            url: "blog-article-2.html"
        },
        {
            id: 3,
            title: "Common Pitfalls in AI Testing and How to Avoid Them",
            date: "2026-04-10",
            category: "Quality Assurance",
            summary: "Explore the most common mistakes teams make when testing AI models and learn practical strategies to avoid them. Improve your testing effectiveness today.",
            url: "blog-article-3.html"
        },
        {
            id: 4,
            title: "Building a Testing Framework for LLM Applications",
            date: "2026-04-05",
            category: "Framework",
            summary: "A deep dive into building comprehensive testing frameworks for large language model applications. Includes practical examples and best practices.",
            url: "blog-article-4.html"
        },
        {
            id: 5,
            title: "SDET Best Practices for AI and ML Testing",
            date: "2026-03-28",
            category: "SDET Tips",
            summary: "Explore SDET best practices specifically tailored for AI and machine learning testing. Learn how to automate your testing workflows effectively.",
            url: "blog-article-5.html"
        }
    ];

    // Render articles
    function renderArticles() {
        const articlesList = document.getElementById('articles-list');
        articlesList.innerHTML = articles
            .sort((a, b) => new Date(b.date) - new Date(a.date))
            .map(article => `
                <div class="article-card" onclick="window.location.href='${article.url}'">
                    <div class="article-meta">
                        <span class="article-date">📅 ${formatDate(article.date)}</span>
                        <span class="article-category">${article.category}</span>
                    </div>
                    <h2>${article.title}</h2>
                    <p>${article.summary}</p>
                    <a href="${article.url}" class="read-more">Read Full Article →</a>
                </div>
            `)
            .join('');
    }

    function formatDate(dateStr) {
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        return new Date(dateStr).toLocaleDateString('en-US', options);
    }

    // Chatbot integration
    const GEMINI_API_KEY = 'AIzaSyDa3ZdZ-Lv9U4Nw07cjETFABHuoLyuTNjg';
    const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent';

    const chatMessages = document.getElementById('chat-messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    const SYSTEM_PROMPT = `You are an expert AI Testing and SDET specialist helping users learn about AI-driven testing, test automation, and quality assurance best practices.`;

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        displayMessage(message, 'user');
        userInput.value = '';
        userInput.focus();
        displayMessage('Typing...', 'bot-loading');

        try {
            const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `${SYSTEM_PROMPT}\n\nUser Question: ${message}` }]
                    }],
                    generationConfig: { temperature: 0.7, maxOutputTokens: 500 }
                })
            });

            const data = await response.json();
            
            // Check for API errors
            if (data.error) {
                throw new Error(data.error.message || 'API Error occurred');
            }
            
            // Ensure we have candidates
            if (!data.candidates || !data.candidates[0] || !data.candidates[0].content || !data.candidates[0].content.parts[0]) {
                console.error('Unexpected API response:', data);
                throw new Error('Invalid response format from API');
            }
            
            const botResponse = data.candidates[0].content.parts[0].text;
            removeLoadingIndicator();
            displayMessage(botResponse, 'bot');
        } catch (error) {
            removeLoadingIndicator();
            displayMessage(`Sorry, I encountered an error: ${error.message}`, 'bot-error');
        }
    }

    function displayMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `chat-message ${sender}`;
        messageDiv.textContent = text;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeLoadingIndicator() {
        const loadingMsg = chatMessages.querySelector('.bot-loading');
        if (loadingMsg) loadingMsg.remove();
    }

    // Temporarily disabled - backend migration in progress
    /*
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    window.addEventListener('load', () => {
        renderArticles();
        displayMessage('👋 Hi! I\'m your AI Testing Assistant. Ask me about AI testing, test automation, SDET practices, or quality assurance!', 'bot');
    });
    */

    window.addEventListener('load', () => {
        renderArticles();
        displayMessage('🔧 Chatbot temporarily offline - upgrading for better security. Check back soon!', 'bot');
    });
</script>
</body>
</html>
